<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>登录 · 星选商城智能客服</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,#0f3025,#176b4d);font-family:"Microsoft YaHei","PingFang SC",sans-serif;color:#17211d}.shell{width:min(900px,92vw);min-height:540px;display:grid;grid-template-columns:1.05fr .95fr;overflow:hidden;border-radius:22px;background:#fff;box-shadow:0 30px 90px rgba(0,0,0,.25)}.intro{position:relative;padding:58px;color:#eef8f3;background:linear-gradient(160deg,#153d30,#0b291f)}.mark{width:48px;height:48px;display:grid;place-items:center;border-radius:14px;color:#153d30;background:#d8b65d;font-size:22px;font-weight:800}.intro h1{margin:80px 0 14px;font-size:32px;line-height:1.3}.intro p{color:#a7c3b7;line-height:1.8;font-size:14px}.features{display:grid;gap:14px;margin-top:40px}.features span{font-size:12px;color:#c7dbd2}.features i{display:inline-grid;width:20px;height:20px;margin-right:8px;place-items:center;border-radius:50%;color:#d8b65d;background:rgba(255,255,255,.08);font-style:normal}.login{display:flex;flex-direction:column;justify-content:center;padding:58px}.login small{color:#176b4d;font-weight:700;letter-spacing:.14em}.login h2{margin:8px 0 8px;font-size:26px}.login>p{margin:0 0 28px;color:#7c8983;font-size:12px}.login label{display:block;margin:0 0 17px;color:#4e5b55;font-size:12px;font-weight:700}.login input{width:100%;margin-top:8px;padding:12px 13px;border:1px solid #dbe3df;border-radius:9px;outline:0;font:inherit}.login input:focus{border-color:#176b4d;box-shadow:0 0 0 3px #e7f3ed}.login button{border:0;border-radius:9px;padding:13px;color:#fff;background:#176b4d;font-weight:700;cursor:pointer}.login button:disabled{opacity:.55}.error{min-height:20px;margin:12px 0 0!important;color:#c04f40!important;font-size:11px!important}@media(max-width:700px){.shell{grid-template-columns:1fr}.intro{display:none}.login{padding:40px 28px}}
  </style>
</head>
<body><main class="shell"><section class="intro"><div class="mark">智</div><h1>星选商城<br>智能客服平台</h1><p>统一管理客户会话、企业知识、售后工单和服务数据，让每一次回答都有依据、每一次操作都可追溯。</p><div class="features"><span><i>✓</i>企业级角色权限控制</span><span><i>✓</i>客户数据严格租户隔离</span><span><i>✓</i>关键操作全程审计</span></div></section><form id="login-form" class="login"><small>ENTERPRISE SERVICE</small><h2>登录客服工作台</h2><p>请使用企业管理员分配的账号登录</p><label>企业邮箱<input id="email" type="email" autocomplete="username" required placeholder="name@company.com"></label><label>登录密码<input id="password" type="password" autocomplete="current-password" minlength="8" required placeholder="请输入登录密码"></label><button id="submit" type="submit">安全登录</button><p id="error" class="error"></p></form></main><script>
  document.querySelector('#login-form').addEventListener('submit',async(e)=>{e.preventDefault();const button=document.querySelector('#submit');const error=document.querySelector('#error');button.disabled=true;button.textContent='正在验证…';error.textContent='';try{const response=await fetch('/api/v1/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:document.querySelector('#email').value,password:document.querySelector('#password').value})});if(!response.ok){const data=await response.json();throw new Error(data.detail||'登录失败')}location.href='/'}catch(err){error.textContent=err.message}finally{button.disabled=false;button.textContent='安全登录'}});
  </script></body></html>
