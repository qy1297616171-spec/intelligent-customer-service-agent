name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --locked --extra dev
      - run: uv run pytest
      - name: Validate migrations
        env:
          DATABASE_URL: sqlite:///./ci.db
        run: uv run alembic upgrade head
      - run: uv run python scripts/generate_evaluation_dataset.py
      - run: uv run python scripts/validate_evaluation_dataset.py

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: enterprise-ai-customer-service:ci
