groups:
  - name: customer-service-api
    rules:
      - alert: CustomerServiceApiDown
        expr: up{job="customer-service-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "智能客服 API 不可用"
          description: "Prometheus 已连续 1 分钟无法抓取客服 API。"
      - alert: CustomerServiceHighErrorRate
        expr: |
          sum(rate(customer_service_http_requests_total{status=~"5.."}[5m]))
          / clamp_min(sum(rate(customer_service_http_requests_total[5m])), 0.001) > 0.02
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "智能客服 API 5xx 错误率过高"
          description: "最近 5 分钟 5xx 错误率持续超过 2%。"
      - alert: CustomerServiceHighP95Latency
        expr: |
          histogram_quantile(0.95,
            sum by (le) (rate(customer_service_http_request_duration_seconds_bucket[5m]))
          ) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "智能客服 API P95 延迟过高"
          description: "最近 5 分钟 P95 响应时间持续超过 2 秒。"
      - alert: CustomerServiceLlmHighErrorRate
        expr: |
          sum(rate(customer_service_ai_model_requests_total{outcome="error"}[5m]))
          / clamp_min(sum(rate(customer_service_ai_model_requests_total[5m])), 0.001) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "智能客服大模型错误率过高"
          description: "真实模型调用错误率连续 5 分钟超过 10%，请检查供应商状态、额度和网络。"
